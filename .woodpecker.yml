when:
  - event: push
    branch: main

steps:
  - name: build
    image: peaceiris/hugo:v0.160.1-ext
    when:
      - event: push
        branch: main
    environment:
      HUGO_ENVIRONMENT: production
      TZ: Europe/London
    commands:
      - apt-get update -qq && apt-get install -y -qq git python3 nodejs npm
      - git submodule update --init --recursive
      - hugo --gc --minify --baseURL "https://BongoTwisty.codeberg.page/"
      - npx -y pagefind@1.3.0 --site public
      - python3 tools/send_webmentions.py
      - test -d public
      - test -f public/index.html

  - name: publish
    image: alpine:3.20
    when:
      - event: push
        branch: main
    environment:
      TZ: Europe/London
      DEPLOY_KEY:
        from_secret: pages_deploy_key
    commands:
      - apk add --no-cache git openssh-client
      - git config --global user.email "ci@bongo-twisty"
      - git config --global user.name "CI Deploy"
      - eval "$(ssh-agent -s)"
      - echo "$DEPLOY_KEY" | tr -d '\r' | ssh-add -
      - mkdir -p ~/.ssh
      - ssh-keyscan codeberg.org >> ~/.ssh/known_hosts
      - git clone --branch pages git@codeberg.org:BongoTwisty/pages.git pages-repo
      - rm -rf pages-repo/*
      - cp -a public/. pages-repo/
      - cp static/.domains pages-repo/.domains 2>/dev/null || echo "BongoTwisty.codeberg.page" > pages-repo/.domains
      - cd pages-repo
      - git add --all
      - git commit -m "Deploy ${CI_COMMIT_SHA} $(date -u +%Y-%m-%dT%H:%M:%SZ)" --allow-empty
      - git push origin pages