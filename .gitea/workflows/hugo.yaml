name: Deploy Hugo site to Codeberg Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      HUGO_VERSION: 0.160.1
      HUGO_ENVIRONMENT: production
      TZ: Europe/London

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Install Dart Sass
        run: sudo snap install dart-sass

      - name: Install Node.js dependencies
        run: "[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true"

      - name: Build with Hugo
        run: |
          hugo \
          --gc \
          --minify \
          --baseURL "https://YOURUSERNAME.codeberg.page/" \
          --cacheDir "${{ runner.temp }}/hugo_cache"

      - name: Index with Pagefind
        run: npx -y pagefind@1.3.0 --site public

      - name: Send Webmentions
        env:
          MODE: incremental
        run: python tools/send_webmentions.py

      - name: Deploy to Codeberg Pages
        env:
          DEPLOY_KEY: ${{ secrets.PAGES_DEPLOY_KEY }}
        run: |
          git config --global user.email "ci@bongo-twisty"
          git config --global user.name "CI Deploy"
          eval $(ssh-agent -s)
          echo "$DEPLOY_KEY" | tr -d '\r' | ssh-add -
          mkdir -p ~/.ssh
          ssh-keyscan codeberg.org >> ~/.ssh/known_hosts
          cd public
          git init
          git checkout -b pages
          cp ../static/.domains . 2>/dev/null || echo "YOURUSERNAME.codeberg.page" > .domains
          git add .
          git commit -m "Deploy: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push --force git@codeberg.org:YOURUSERNAME/pages.git pages:pages
